title: James Chapman Portfolio
description: Cybersecurity portfolio and TryHackMe learning notes
markdown: kramdown
kramdown:
  input: GFM
timezone: America/New_York
collections_dir: .
collections:
  notes:
    output: true
    permalink: /blog/:path/
exclude:
  - documents/notes/**
defaults:
  - scope:
      path: ""
      type: notes
    values:
      layout: post
      author: James Chapman
