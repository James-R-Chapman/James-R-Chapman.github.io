<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
      :root {
        --bg: #0a0e27;
        --card: #151932;
        --text: #e0e0e0;
        --muted: #a0a0a0;
        --accent: #00d9ff;
        --accent-2: #00ff88;
        --border: #2a2f4a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        background: linear-gradient(135deg, var(--bg) 0%, #0d1127 100%);
        color: var(--text);
      }

      .wrap {
        max-width: {% if page.collection == "notes" or page.url == "/blog/tryhackme/" %}1700px{% else %}900px{% endif %};
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }

      .topbar {
        border-bottom: 1px solid var(--border);
        background: rgba(10, 14, 39, 0.95);
        position: sticky;
        top: 0;
        backdrop-filter: blur(10px);
      }

      .topbar-inner {
        max-width: 900px;
        margin: 0 auto;
        padding: 1rem 1.25rem;
        display: flex;
        gap: 1rem;
      }

      a {
        color: var(--accent);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.25rem;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .card * {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .card code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.95em;
        background: rgba(0, 217, 255, 0.14);
        border: 1px solid rgba(0, 217, 255, 0.25);
        border-radius: 4px;
        padding: 0.1rem 0.35rem;
        white-space: pre-wrap;
      }

      .card pre,
      .card .highlight {
        background: #0b1024;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem;
        overflow-x: auto;
      }

      .card pre {
        margin: 1rem 0;
        white-space: pre-wrap;
      }

      .card pre code,
      .card .highlight code {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        font-size: 0.92rem;
        white-space: pre-wrap;
      }

      .card .highlight pre {
        margin: 0;
        padding: 0;
        background: transparent;
        border: 0;
      }

      .note-post .post-content > h1:first-child {
        display: none;
      }

      h1, h2, h3 {
        margin-top: 0;
        color: var(--accent);
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </div>
    </header>
    <main class="wrap">
      {{ content }}
    </main>
  </body>
</html>
