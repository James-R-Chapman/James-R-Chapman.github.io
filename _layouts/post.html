---
layout: default
---
<article class="card">
  <h1>{{ page.title }}</h1>
  <p class="muted">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.hubs %} | {{ page.hubs }}{% endif %}
  </p>
  {% if page.tags %}
    <p class="muted">
      Tags:
      {% if page.tags.first %}
        {{ page.tags | join: ", " }}
      {% else %}
        {{ page.tags }}
      {% endif %}
    </p>
  {% endif %}
  {{ content }}
</article>
