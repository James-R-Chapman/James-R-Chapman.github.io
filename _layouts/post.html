---
layout: default
---
<article class="card{% if page.collection == 'notes' %} note-post{% endif %}">
  <h1>{{ page.title }}</h1>
  <p class="muted">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.hubs %} | {{ page.hubs }}{% endif %}
  </p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
